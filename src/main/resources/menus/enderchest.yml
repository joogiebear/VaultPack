# ============================================
# VaultPack - Ender Chest Page Selector
# ============================================
# View and manage all 9 ender chest pages!
# Command: /enderchest
#
# Slot Reference (6 rows = 54 slots):
#   Row 1: [ 0] [ 1] [ 2] [ 3] [ 4] [ 5] [ 6] [ 7] [ 8]
#   Row 2: [ 9] [10] [11] [12] [13] [14] [15] [16] [17]
#   Row 3: [18] [19] [20] [21] [22] [23] [24] [25] [26]
#   Row 4: [27] [28] [29] [30] [31] [32] [33] [34] [35]
#   Row 5: [36] [37] [38] [39] [40] [41] [42] [43] [44]
#   Row 6: [45] [46] [47] [48] [49] [50] [51] [52] [53]
# ============================================

title: "&5&l⬢ Ender Chest Pages ⬢"
rows: 6

# Visual mask pattern (ender-themed)
mask:
  items:
    - purple_stained_glass_pane  # 1
    - black_stained_glass_pane   # 2
  pattern:
    - "222222222"  # Slots 0-8
    - "211111112"  # Slots 9-17
    - "210000012"  # Slots 18-26
    - "210000012"  # Slots 27-35
    - "211111112"  # Slots 36-44
    - "222020222"  # Slots 45-53

# Custom decoration slots
slots:
  # ========== HEADER ==========
  header:
    slot: 4
    item: ender_chest
    name: "&5&l⬢ Your Ender Storage ⬢"
    lore:
      - ""
      - "&7Global storage accessible"
      - "&7from anywhere in the world!"
      - ""
      - "&dUnlocked Pages: &f%unlocked_pages%&7/&f9"
      - "&dTotal Capacity: &f%total_capacity% slots"
      - "&dItems Stored: &a%total_items%"
      - ""
      - "&8Each page holds 45 items (5 rows)"
    glow: true

  # ========== HELP INFO ==========
  help:
    slot: 48
    item: ender_eye
    name: "&dℹ &7Page Information"
    lore:
      - ""
      - "&7• Each page has &f45 slots &7(5 rows)"
      - "&7• Unlock pages with &6/ec unlock <page>"
      - "&7• Or use permissions"
      - "&7• Items persist after death"
      - "&7• Access from any ender chest"
      - ""
      - "&8Permission: vaultpack.enderchest.page.#"

  # ========== NAVIGATION ==========
  close:
    slot: 49
    item: barrier
    name: "&cClose"
    click-action: close_inventory

  back:
    slot: 50
    item: arrow
    name: "&fBack to Storage"
    lore:
      - "&7Return to unified storage menu"
    click-action: open_menu
    menu: storage

# ========== ALL 9 ENDER PAGES ==========
# Grid layout: 5 pages in row 3, 4 pages in row 4
enderchest-pages:
  # Row 3: Pages 1-5 (slots 20-24, centered)
  page-1:
    slot: 20
  page-2:
    slot: 21
  page-3:
    slot: 22
  page-4:
    slot: 23
  page-5:
    slot: 24

  # Row 4: Pages 6-9 (slots 29-32, centered)
  page-6:
    slot: 29
  page-7:
    slot: 30
  page-8:
    slot: 31
  page-9:
    slot: 32

  # ========== PAGE APPEARANCES ==========

  # Locked page design
  locked:
    item: gray_dye
    name: "&7Page %page% &c✖ LOCKED"
    lore:
      - ""
      - "&7Capacity: &f45 slots"
      - "&7Status: &cLocked"
      - ""
      - "&dUnlock Cost: &a$%cost%"
      - "&dPermission: &7vaultpack.enderchest.page.%page%"
      - ""
      - "&eLeft-Click &8» &7Unlock with money"
      - "&eRight-Click &8» &7View info"
    left-click-action: unlock_page
    right-click-action: show_unlock_info

  # Unlocked empty page
  unlocked-empty:
    item: ender_pearl
    name: "&5Page %page% &a✓ &7EMPTY"
    lore:
      - ""
      - "&7Capacity: &f45 slots"
      - "&7Items: &70&7/&f45"
      - "&7Status: &aUnlocked"
      - ""
      - "&eClick to open!"
    click-action: open_page

  # Unlocked page with items
  unlocked-active:
    item: ender_eye
    name: "&5Page %page% &a✓ &8[%fill_percent%%]"
    lore:
      - ""
      - "&7Capacity: &f45 slots"
      - "&7Items: &a%used%&7/&f45"
      - "&7Status: &aUnlocked"
      - ""
      - "&7Fill: %fill_bar%"
      - ""
      - "&eClick to open!"
    click-action: open_page
    glow: true

# ========== SOUNDS ==========
sounds:
  open: BLOCK_ENDER_CHEST_OPEN
  close: BLOCK_ENDER_CHEST_CLOSE
  page-open: BLOCK_ENDER_CHEST_OPEN
  unlock: ENTITY_PLAYER_LEVELUP
  error: ENTITY_VILLAGER_NO
