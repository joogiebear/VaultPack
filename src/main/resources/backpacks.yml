      - ecoitems:enchanted_leather 12
      - ecoitems:enchanted_leather 12
      - ecoitems:enchanted_leather 12
      - ecoitems:enchanted_leather 12

    upgrade-from: large
    crafting-permission: "vaultpack.craft.greater"

    lore:
      - ""
      - "&7Rarity: &b&lCelestial"
      - "&7Tier: &b&l%tier%"
      - "&7Capacity: &f%used%/%size% items"
