# VaultPack configuration

config-version: 3

# General
plugin-prefix: "&8[&6VaultPack&8]&r"
default-language: en_US
check-for-updates: true

# Features
enable-backpacks: true
enable-ender-chests: true
enable-virtual-storage: true
enable-crafting: true

# Storage limits
max-backpack-slots: 18
default-unlocked-slots: 1

# Data storage
storage-type: yaml
backup-enabled: true
auto-save-interval: 300
max-backups: 5
backup-format: "yyyy-MM-dd_HH-mm-ss"

# Runtime data backend. Must match storage-type above.
data:
  storage-type: yaml

database:
  host: localhost
  port: 3306
  name: vaultpack
  username: root
  password: changeme
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
  ssl:
    enabled: false
    verify-certificate: true

# Performance
cache-expiry-minutes: 30
async-data-saving: true
save-queue-size: 100
enable-metrics: true

performance:
  show-cache-stats-on-join: false

# Economy and unlock costs
economy-enabled: true
slot-unlock-enabled: true
slot-unlock-base-cost: 1000
slot-unlock-cost-per-slot: 500
page-unlock-enabled: true
page-unlock-base-cost: 2000
page-unlock-cost-per-page: 1000
upgrade-enabled: true
upgrade-small-to-medium: 5000
upgrade-medium-to-large: 10000
upgrade-large-to-huge: 20000
upgrade-huge-to-massive: 40000
upgrade-massive-to-colossal: 80000
upgrade-colossal-to-greater: 160000
upgrade-greater-to-jumbo: 320000

# Permission unlocks
use-permissions-for-slots: true
use-permissions-for-pages: true
slot-permission-format: "vaultpack.slots.%slot%"
page-permission-format: "vaultpack.enderchest.page.%page%"

# Item storage restrictions
blacklist-enabled: true
blacklist-message: "&cThis item cannot be stored in backpacks!"

item-blacklist:
  enabled: true
  materials:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - COMMAND_BLOCK_MINECART
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
  prevent-shulker-boxes: false
  prevent-all-shulker-variants: false

# Advanced
advanced:
  debug: false
  metrics: true
  max-title-length: 32
  allow-nested-backpacks: false
  shift-click-to-backpack: true

debug-mode: false
verbose-logging: false
log-sql-queries: false
