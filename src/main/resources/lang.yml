# VaultPack Language File
# Customize all messages here

prefix: "&8[&6VaultPack&8]&r "

# Slot unlock messages
slot-unlocked: "&aYou unlocked backpack slot #<slot>!"
slot-unlock-fail: "&cYou don't have enough money! Required: &e$<cost>"
slot-unlock-no-permission: "&cYou don't have permission to unlock this slot!"
slot-already-unlocked: "&cThis slot is already unlocked!"
max-slots-reached: "&cYou've reached the maximum number of backpack slots! (<max>)"
invalid-slot-number: "&cInvalid slot number! Must be between 1 and 18."
invalid-page-number: "&cInvalid page number! Must be between 1 and 9."

# Backpack upgrade messages
backpack-upgraded: "&aBackpack upgraded from &f<old_tier> &ato &f<new_tier>&a!"
backpack-upgrade-fail: "&cYou don't have enough money! Required: &e$<cost>"
backpack-upgrade-max: "&cThis backpack is already at maximum size!"
backpack-upgrade-no-backpack: "&cThere's no backpack in this slot to upgrade!"
backpack-swap-size-error: "&cYou can only swap with a LARGER backpack!"
backpack-swap-size-info: "&eCurrent: <old_size> slots | New: <new_size> slots"
backpack-swap-success: "&aBackpack upgraded from <old_size> to <new_size> slots!"
backpack-swap-preserved: "&eAll items have been preserved!"

# Backpack placement messages
backpack-placed: "&aBackpack placed in slot #<slot>!"
backpack-placed-type: "&aPlaced <type> &ain slot #<slot>!"
backpack-place-fail: "&cYou must hold a backpack item in your hand!"
backpack-place-occupied: "&cThis slot already has a backpack! Remove it first."
backpack-item-only: "&cYou can only place backpack items in these slots!"
backpack-item-invalid: "&cThis backpack item is invalid!"
backpack-type-unknown: "&cUnknown backpack type: <type>"
backpack-place-error: "&cFailed to place backpack: <error>"
slot-locked: "&cThis slot is locked! Unlock it first."
no-permission: "&cYou don't have permission to do that!"

# Backpack removal messages
backpack-removed: "&aBackpack removed from slot #<slot> and returned to inventory!"
backpack-removed-type: "&aRemoved <type> &afrom slot #<slot>!"
backpack-removed-dropped: "&eYour inventory is full! Backpack dropped at your feet."
backpack-remove-fail: "&cThere's no backpack in this slot!"
backpack-remove-not-empty: "&cThis backpack contains items! Empty it before removing."
backpack-remove-tip: "&eTip: You can upgrade backpacks without removing them."
backpack-remove-full-inventory: "&cYour inventory is full! Cannot remove backpack."
backpack-remove-confirm: "&eRight-click again to confirm removal. Items will be safe!"
backpack-remove-error: "&cFailed to remove backpack: <error>"

# Backpack usage messages
backpack-opened: "&aOpened backpack #<slot>"
backpack-full: "&cThis backpack is full! (<used>/<size> slots)"
backpack-empty: "&7This backpack is empty."

# Ender chest messages
ender-page-unlocked: "&aEnder page <page> unlocked!"
ender-page-unlocked-cost: "&aEnder page <page> unlocked for $<cost>!"
ender-page-unlock-fail: "&cYou don't have enough money! Required: &e$<cost>"
ender-page-unlock-no-permission: "&cYou don't have permission to unlock this ender page!"
ender-page-already-unlocked: "&cThis ender page is already unlocked!"
enderchest-invalid-page: "&cInvalid page number! Use a number between 1-9."
enderchest-page-locked: "&cYou haven't unlocked Ender Page <page> yet!"
enderchest-view-pages: "&eUse /enderchest to view all pages and unlock them."

# Error messages
no-permission: "&cYou don't have permission to do that!"
invalid-slot: "&cInvalid slot number! Must be between 1 and <max>."
player-not-found: "&cPlayer not found!"
command-player-only: "&cThis command can only be used by players!"
economy-not-found: "&cEconomy plugin not found! Contact an administrator."
data-load-error: "&cFailed to load your backpack data! Contact an administrator."
menu-not-found: "&cMenu not found: <menu>"
menu-not-implemented: "&cMenu not implemented: <menu>"
feature-coming-soon: "&eThis feature is coming soon!"

# Admin messages
admin-unknown-command: "&cUnknown command! Use /vaultpack help"
admin-reload-start: "&eReloading VaultPack..."
admin-slot-given: "&aGave <player> access to slot #<slot>!"
admin-slot-given-target: "&aYou've been given access to backpack slot #<slot>!"
admin-slot-removed: "&cRemoved <player>'s access to slot #<slot>!"
admin-backpack-cleared: "&aCleared <player>'s backpack #<slot>!"
admin-backpack-cleared-target: "&eYour backpack #<slot> was cleared by an admin!"
admin-backpack-no-backpack: "&cPlayer doesn't have a backpack in that slot!"
admin-backpack-given: "&aGave <player> <amount>x <type>!"
admin-backpack-given-target: "&aYou received <amount>x <type>!"
admin-reload: "&aVaultPack configuration reloaded!"
admin-invalid-amount: "&cInvalid amount!"
admin-invalid-type: "&cInvalid backpack type! Available types:"
admin-player-offline: "&cPlayer not found or not online!"

# GUI item names and lore
gui:
  locked-slot:
    name: "&7Backpack Slot #<slot> &c[LOCKED]"
    lore:
      - "&7This slot is currently locked."
      - ""
      - "&eUnlock via Economy: &a$<cost>"
      - "&eUnlock via Permission: &f<permission>"
      - ""
      - "&7Purchase upgrades or obtain"
      - "&7permissions to unlock this slot!"
      - ""
      - "&8Slot ID: #<slot>"

  empty-slot:
    name: "&aBackpack Slot #<slot> &7[EMPTY]"
    lore:
      - "&7This slot is unlocked but empty!"
      - ""
      - "&7Craft a backpack item and"
      - "&7click here to place it."
      - ""
      - "&eLeft-Click &7to place backpack"
      - ""
      - "&8Slot ID: #<slot>"

  active-slot:
    name: "&6Backpack #<slot>"
    lore:
      - "&7Tier: &f<tier>"
      - "&7Capacity: &e<size> slots"
      - "&7Used: &a<used>&7/&e<size>"
      - "&7Fullness: <fullness_bar>"
      - ""
      - "&eLeft-Click &7to open backpack"
      - "&eRight-Click &7to remove backpack"
      - "&eShift-Click &7to upgrade size"
      - ""
      - "&8Slot ID: #<slot>"

  close-button:
    name: "&cClose Menu"
    lore:
      - "&7Click to close"

  storage-backpack-status:
    placed: "&7Status: &aPlaced in slot #<slot>"
    items: "&7Items: &f<used>/<size>"
    contains-items: "&c&lContains items - Cannot remove!"
    click-to-remove: "&a&lClick to remove (empty)"

  info-button:
    name: "&bBackpack Info"
    lore:
      - "&7Total Slots: &e<unlocked>&7/&e<max>"
      - "&7Active Backpacks: &a<active>"
      - "&7Total Storage: &e<total_slots> slots"
      - ""
      - "&7Backpacks provide extra"
      - "&7storage that you can access"
      - "&7anywhere, anytime!"

  upgrade-button:
    name: "&aUpgrade Size"
    lore:
      - "&7Current: &f<current_tier> &7(&e<current_size> slots&7)"
      - "&7Next: &f<next_tier> &7(&e<next_size> slots&7)"
      - ""
      - "&eCost: &a$<cost>"
      - ""
      - "&eClick to upgrade!"

  unlock-button:
    name: "&aUnlock Slot"
    lore:
      - "&7Unlock this backpack slot"
      - "&7to store another backpack!"
      - ""
      - "&eCost: &a$<cost>"
      - ""
      - "&eClick to unlock!"

