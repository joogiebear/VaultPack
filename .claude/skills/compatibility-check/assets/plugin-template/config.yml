# Configuration file for MyPlugin

# Database configuration
database:
  enabled: false
  type: mysql # Options: mysql, mongodb
  
  # MySQL settings
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: changeme
    pool:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
  
  # MongoDB settings
  mongodb:
    uri: mongodb://localhost:27017
    database: minecraft
    pool:
      min-size: 2
      max-size: 10

# Messages - all user-facing text should be here, not hardcoded
messages:
  prefix: '<gray>[<gold>MyPlugin</gold>]</gray> '
  
  # General messages
  no-permission: '<prefix><red>You do not have permission to use this command.'
  reload-success: '<prefix><green>Configuration reloaded successfully!'
  reload-failed: '<prefix><red>Failed to reload configuration. Check console for errors.'
  player-only: '<prefix><red>This command can only be used by players.'
  
  # Error messages
  error-loading-data: '<prefix><red>Failed to load your data. Please try again or contact an admin.'
  error-saving-data: '<prefix><red>Failed to save your data. Please contact an admin.'
  
  # Placeholder examples
  player-info: '<prefix>Player: <yellow>%player_name%</yellow>, Balance: <gold>%myplugin_balance%</gold>'

# Feature settings
features:
  auto-save:
    enabled: true
    interval-minutes: 5
  
  debug-mode: false

# PlaceholderAPI settings (if using)
placeholders:
  enabled: true
  cache-duration-seconds: 60
