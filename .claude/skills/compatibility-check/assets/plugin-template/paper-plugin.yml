name: MyPlugin
version: ${version}
description: ${description}
main: com.example.myplugin.MyPlugin
api-version: 1.21
author: YourName
website: https://github.com/yourusername/myplugin

# Folia support - this plugin is compatible with Folia
folia-supported: true

# Bootstrap (optional - for advanced plugin loading)
# bootstrapper: com.example.myplugin.MyPluginBootstrap

# Plugin loading
dependencies:
  server:
    PlaceholderAPI:
      load: BEFORE
      required: false
      join-classpath: true

# Permissions
permissions:
  myplugin.use:
    description: Allows use of the plugin
    default: true
  myplugin.admin:
    description: Administrative commands
    default: op
    children:
      myplugin.reload: true
      myplugin.manage: true
  myplugin.reload:
    description: Reload plugin configuration
    default: op
  myplugin.manage:
    description: Manage plugin data
    default: op
